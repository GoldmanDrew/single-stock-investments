name: Build Portfolio Dashboard & Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '_system/scripts/build_dashboard_data.py'
      - '_system/portfolio/holdings.md'
      - '**/README.md'
      - '**/_download_log.txt'
      - '**/DOWNLOAD_MANIFEST.json'
  schedule:
    - cron: "0 12 * * *"  # Daily noon UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: portfolio-dashboard-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard data
        run: python _system/scripts/build_dashboard_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp dashboard/index.html _site/
          cp -r dashboard/data _site/data

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
